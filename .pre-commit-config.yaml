repos:
  # ── Checks generales ──────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^package-lock\.json$
      - id: check-merge-conflict
      - id: debug-statements       # evita print/breakpoint olvidados en commit
      - id: check-added-large-files
        args: ['--maxkb=500']

  # ── Formateo Python (black) ───────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: ['--line-length=100']

  # ── Linting + imports (ruff) ──────────────────────────────────────────────────
  # E/W: pycodestyle · F: pyflakes · I: isort · UP: modernización Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args:
          - --fix
          - --select=E,F,I,W,UP
          - --ignore=E501   # longitud de línea la gestiona black
          - --line-length=100
